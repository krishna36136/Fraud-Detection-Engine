spring.application.name=Risk-Scoring-Service
server.port=8083

# =========================
# Kafka Bootstrap
# =========================
spring.kafka.bootstrap-servers=localhost:9092

# =========================
# Kafka Consumer
# =========================
spring.kafka.consumer.group-id=risk-scoring-group
spring.kafka.consumer.auto-offset-reset=earliest

#  Error-handling deserializers (REQUIRED)
spring.kafka.consumer.key-deserializer=org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.ErrorHandlingDeserializer

#  Delegate actual deserializers
spring.kafka.consumer.properties.spring.deserializer.key.delegate.class=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.properties.spring.deserializer.value.delegate.class=org.springframework.kafka.support.serializer.JsonDeserializer

# JSON  POJO mapping
spring.kafka.consumer.properties.spring.json.trusted.packages=com.krishna.Risk_Scoring_Service.event
spring.kafka.consumer.properties.spring.json.use.type.headers=false
spring.kafka.consumer.properties.spring.json.value.default.type=com.krishna.Risk_Scoring_Service.event.FeatureEvent

#  Java Time support
spring.kafka.consumer.properties.spring.json.jackson.time-zone=UTC

# =========================
# Kafka Producer
# =========================
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

# =========================
# Topics
# =========================
topic.features=transaction-features-topic
topic.fraud-scores=fraud-score-topic

# =========================
# Logging
# =========================
logging.level.org.springframework.kafka=INFO
logging.level.com.krishna.Risk_Scoring_Service=DEBUG



ml.service.url=http://localhost:8000